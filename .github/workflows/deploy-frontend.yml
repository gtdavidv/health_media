name: Deploy Frontend

on:
  push:
    branches: [ main ]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::990521646754:role/github-actions
          aws-region: us-east-1

      - name: Fetch Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          terraform init -input=false
          echo "bucket=$(terraform output -raw frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "dist_id=$(terraform output -raw frontend_distribution)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Determine build path
        id: path
        run: |
          for d in build dist out; do
            if [ -d "frontend/$d" ]; then
              echo "dir=frontend/$d" >> "$GITHUB_OUTPUT"; exit 0
            fi
          done
          echo "No build dir found"; exit 1
      
      - name: Sync to S3
        run: aws s3 sync "${{ steps.path.outputs.dir }}" "s3://${{ steps.tf.outputs.bucket }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id "${{ steps.tf.outputs.dist_id }}" --paths "/*"
